<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dart Shooter Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #e63946;
            --gold: #ffd60a;
            --green: #57cc99;
            --dim: #8d99ae;
            --bg: #0a0a0f;
            --card: #12121a;
            --border: #1e1e2e;
            --text: #edf2f4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.1) 3px
            );
            pointer-events: none;
            z-index: 1;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            animation: fadeIn 0.5s ease;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Login Screen */
        .login-card {
            background: var(--card);
            padding: 40px 60px;
            border: 1px solid var(--border);
            border-top: 2px solid linear-gradient(to right, var(--red), var(--gold));
            text-align: center;
            box-shadow: 0 0 20px rgba(230, 57, 70, 0.2);
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 64px;
            color: var(--gold);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(255, 214, 10, 0.5);
        }

        .player-select {
            margin-bottom: 20px;
            text-align: left;
            width: 100%;
        }

        .player-select label {
            display: block;
            margin-bottom: 8px;
            color: var(--dim);
            font-size: 18px;
        }

        select, input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            border-radius: 4px;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--gold);
        }

        .btn {
            background: linear-gradient(to right, var(--red), #c92a38);
            color: var(--text);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            padding: 12px 48px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(230, 57, 70, 0.6);
        }

        .btn-secondary {
            background: linear-gradient(to right, var(--dim), #6a7785);
            margin-top: 15px;
        }

        /* Game Screen */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            padding: 20px;
        }

        .hud {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 24px;
        }

        .hud-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hud-label {
            font-size: 14px;
            color: var(--dim);
            margin-bottom: 5px;
        }

        .hud-value {
            color: var(--text);
            font-size: 32px;
        }

        .hud-value.timer {
            color: var(--gold);
        }

        .hud-value.timer.danger {
            color: var(--red);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .canvas-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            border: 2px solid var(--border);
            border-radius: 4px;
            cursor: crosshair;
        }

        canvas {
            display: block;
            background: #070710;
        }

        /* Floating text */
        .floating-text {
            position: absolute;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 10;
        }

        .floating-text.hit {
            color: var(--gold);
        }

        .floating-text.miss {
            color: var(--red);
            font-size: 36px;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(1.2); }
        }

        /* Leaderboard Screen */
        .leaderboard-card {
            background: var(--card);
            padding: 40px 60px;
            border: 1px solid var(--border);
            border-top: 2px solid linear-gradient(to right, var(--red), var(--gold));
            text-align: center;
            max-width: 800px;
        }

        .result-banner {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px;
            margin-bottom: 20px;
        }

        .result-banner.win {
            color: var(--gold);
            text-shadow: 0 0 15px rgba(255, 214, 10, 0.6);
        }

        .result-banner.lose {
            color: var(--red);
            text-shadow: 0 0 15px rgba(230, 57, 70, 0.6);
        }

        .round-stats {
            font-family: 'Share Tech Mono', monospace;
            color: var(--text);
            margin-bottom: 30px;
            font-size: 24px;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        .leaderboard-table th {
            text-align: left;
            padding: 12px 16px;
            color: var(--dim);
            font-size: 16px;
            border-bottom: 1px solid var(--border);
        }

        .leaderboard-table td {
            padding: 14px 16px;
            font-size: 20px;
            border-bottom: 1px solid rgba(30, 30, 46, 0.5);
        }

        .leaderboard-table tr:hover {
            background: rgba(230, 57, 70, 0.1);
        }

        .medal {
            color: var(--gold);
            margin-right: 8px;
        }

        .current-player-highlight {
            background: rgba(87, 204, 153, 0.2);
            border-left: 4px solid var(--green);
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 48px; }
            .hud { gap: 20px; }
            .hud-value { font-size: 24px; }
            .leaderboard-card { padding: 20px 30px; }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
        <div class="login-card">
            <h1>Dart Shooter</h1>
            <div class="player-select">
                <label>Or select existing player:</label>
                <select id="existing-player">
                    <option value="">-- Choose Player --</option>
                </select>
            </div>
            <div class="player-select">
                <label>Or enter new name:</label>
                <input type="text" id="new-player-name" placeholder="Enter your name..." maxlength="20">
            </div>
            <button class="btn" id="login-btn">Start Game</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <div class="game-container">
            <div class="hud">
                <div class="hud-item">
                    <span class="hud-label">Player</span>
                    <span class="hud-value" id="hud-player">Player</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">Time</span>
                    <span class="hud-value timer" id="hud-time">03:00</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">Score</span>
                    <span class="hud-value" id="hud-score">0</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">Misses</span>
                    <span class="hud-value" id="hud-misses">0/5</span>
                </div>
            </div>
            <div class="canvas-container">
                <canvas id="game-canvas" width="800" height="600"></canvas>
            </div>
        </div>
    </div>

    <!-- Leaderboard Screen -->
    <div id="leaderboard-screen" class="screen">
        <div class="leaderboard-card">
            <div class="result-banner" id="result-banner">TIME UP!</div>
            <div class="round-stats">
                <span>Player: <span id="lb-player">Player</span></span> &nbsp;|&nbsp;
                <span>Score: <span id="lb-score" style="color: var(--gold)">0</span></span> &nbsp;|&nbsp;
                <span>Misses: <span id="lb-misses">0</span>/5</span>
            </div>
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th>Best Score</th>
                        <th>Games Played</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <!-- Rows will be filled by JS -->
                </tbody>
            </table>
            <div>
                <button class="btn" id="play-again-btn">Play Again</button>
                <button class="btn btn-secondary" id="change-player-btn">Change Player</button>
            </div>
        </div>
    </div>

    <script>
        // Game Constants
        const MAX_TIME = 180;
        const TARGET_RADIUS = 52;
        const MAX_MISSES = 5;
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 600;

        // Game State
        let gameState = {
            player: null,
            score: 0,
            misses: 0,
            timeLeft: MAX_TIME,
            elapsed: 0,
            gameActive: false,
            target: { x: 0, y: 0, dx: 0, dy: 0, speed: 0 }
        };

        let timerInterval = null;
        let animationFrameId = null;

        // DOM Elements
        const screens = {
            login: document.getElementById('login-screen'),
            game: document.getElementById('game-screen'),
            leaderboard: document.getElementById('leaderboard-screen')
        };
        const existingPlayerSelect = document.getElementById('existing-player');
        const newPlayerInput = document.getElementById('new-player-name');
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        // API Endpoints
        const API = {
            players: '/api/players',
            scores: '/api/scores',
            leaderboard: '/api/leaderboard'
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initLogin();
            setupEventListeners();
        });

        function initLogin() {
            fetchPlayers();
        }

        async function fetchPlayers() {
            try {
                const response = await fetch(API.players);
                const players = await response.json();
                existingPlayerSelect.innerHTML = '<option value="">-- Choose Player --</option>';
                players.forEach(p => {
                    const option = document.createElement('option');
                    option.value = p.id;
                    option.textContent = p.name;
                    existingPlayerSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error fetching players:', error);
            }
        }

        function setupEventListeners() {
            document.getElementById('login-btn').addEventListener('click', handleLogin);
            existingPlayerSelect.addEventListener('change', () => {
                if (existingPlayerSelect.value) {
                    newPlayerInput.value = '';
                }
            });
            newPlayerInput.addEventListener('input', () => {
                if (newPlayerInput.value) {
                    existingPlayerSelect.value = '';
                }
            });
            document.getElementById('play-again-btn').addEventListener('click', () => {
                switchScreen('game');
                startGame();
            });
            document.getElementById('change-player-btn').addEventListener('click', () => {
                switchScreen('login');
            });

            // Canvas click handler for shooting
            canvas.addEventListener('click', handleCanvasClick);
        }

        async function handleLogin() {
            let playerId, playerName;

            if (existingPlayerSelect.value) {
                playerId = parseInt(existingPlayerSelect.value);
                playerName = existingPlayerSelect.options[existingPlayerSelect.selectedIndex].text;
            } else if (newPlayerInput.value.trim()) {
                playerName = newPlayerInput.value.trim();
                try {
                    const response = await fetch(API.players, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: playerName })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        playerId = data.id;
                    } else if (response.status === 409) {
                        // Player exists, find them
                        const findResponse = await fetch(`${API.players}/${encodeURIComponent(playerName)}`);
                        if (findResponse.ok) {
                            const data = await findResponse.json();
                            playerId = data.id;
                        } else {
                            alert('Error logging in. Please try again.');
                            return;
                        }
                    } else {
                        alert('Error creating player. Please try again.');
                        return;
                    }
                } catch (error) {
                    alert('Error connecting to server. Please try again.');
                    return;
                }
            } else {
                alert('Please select or enter a player name.');
                return;
            }

            gameState.player = { id: playerId, name: playerName };
            switchScreen('game');
            startGame();
        }

        function switchScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[screenName].classList.add('active');

            // Refresh player list when going back to login
            if (screenName === 'login') {
                fetchPlayers();
            }
        }

        function startGame() {
            // Reset state
            gameState.score = 0;
            gameState.misses = 0;
            gameState.timeLeft = MAX_TIME;
            gameState.elapsed = 0;
            gameState.gameActive = true;

            // Update HUD
            updateHUD();

            // Spawn target
            spawnTarget();

            // Start timer
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                gameState.timeLeft--;
                gameState.elapsed++;
                updateHUD();

                if (gameState.timeLeft <= 0) {
                    endGame('win');
                }
            }, 1000);

            // Start game loop
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            gameLoop();
        }

        function spawnTarget() {
            const padding = TARGET_RADIUS + 10;
            gameState.target.x = padding + Math.random() * (CANVAS_WIDTH - padding * 2);
            gameState.target.y = padding + Math.random() * (CANVAS_HEIGHT - padding * 2);

            // Random angle, speed 1.2 initially
            const angle = Math.random() * Math.PI * 2;
            gameState.target.dx = Math.cos(angle);
            gameState.target.dy = Math.sin(angle);
            gameState.target.speed = 1.2;
        }

        function getTargetSpeed() {
            return 1.2 + gameState.elapsed * 0.025;
        }

        function update() {
            if (!gameState.gameActive) return;

            // Update speed based on elapsed time
            const currentSpeed = getTargetSpeed();

            // Move target
            gameState.target.x += gameState.target.dx * currentSpeed;
            gameState.target.y += gameState.target.dy * currentSpeed;

            // Bounce off walls
            if (gameState.target.x - TARGET_RADIUS < 0) {
                gameState.target.x = TARGET_RADIUS;
                gameState.target.dx *= -1;
            } else if (gameState.target.x + TARGET_RADIUS > CANVAS_WIDTH) {
                gameState.target.x = CANVAS_WIDTH - TARGET_RADIUS;
                gameState.target.dx *= -1;
            }

            if (gameState.target.y - TARGET_RADIUS < 0) {
                gameState.target.y = TARGET_RADIUS;
                gameState.target.dy *= -1;
            } else if (gameState.target.y + TARGET_RADIUS > CANVAS_HEIGHT) {
                gameState.target.y = CANVAS_HEIGHT - TARGET_RADIUS;
                gameState.target.dy *= -1;
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#070710';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Draw grid
            drawGrid();

            // Draw target
            drawTarget();
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(30, 30, 60, 0.6)';
            ctx.lineWidth = 1;

            for (let x = 0; x <= CANVAS_WIDTH; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, CANVAS_HEIGHT);
                ctx.stroke();
            }

            for (let y = 0; y <= CANVAS_HEIGHT; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(CANVAS_WIDTH, y);
                ctx.stroke();
            }
        }

        function drawTarget() {
            const { x, y } = gameState.target;
            const r = TARGET_RADIUS;

            // Glow effect
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(230, 57, 70, 0.5)';

            // Rings from outside to inside
            // Outer rings
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#e63946';
            ctx.beginPath();
            ctx.arc(x, y, r * 0.86, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#f1faee';
            ctx.beginPath();
            ctx.arc(x, y, r * 0.72, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#1d3557';
            ctx.beginPath();
            ctx.arc(x, y, r * 0.58, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#f1faee';
            ctx.beginPath();
            ctx.arc(x, y, r * 0.44, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#e63946';
            ctx.beginPath();
            ctx.arc(x, y, r * 0.30, 0, Math.PI * 2);
            ctx.fill();

            // Bullseye
            ctx.fillStyle = '#ffd60a';
            ctx.beginPath();
            ctx.arc(x, y, r * 0.12, 0, Math.PI * 2);
            ctx.fill();

            // Reset shadow
            ctx.shadowBlur = 0;

            // Crosshair lines
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x - r * 0.9, y);
            ctx.lineTo(x + r * 0.9, y);
            ctx.moveTo(x, y - r * 0.9);
            ctx.lineTo(x, y + r * 0.9);
            ctx.stroke();
        }

        function gameLoop() {
            if (!gameState.gameActive) return;

            update();
            draw();
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function handleCanvasClick(e) {
            if (!gameState.gameActive) return;

            // Account for canvas scaling
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const clickX = (e.clientX - rect.left) * scaleX;
            const clickY = (e.clientY - rect.top) * scaleY;

            // Calculate distance from target center
            const dx = clickX - gameState.target.x;
            const dy = clickY - gameState.target.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const ratio = distance / TARGET_RADIUS;

            if (ratio > 1.00) {
                // MISS
                gameState.misses++;
                showFloatingText(clickX, clickY, 'MISS!', 'miss');
                playSound('miss');
            } else if (ratio <= 0.06) {
                // Bullseye - 50 pts
                addScore(50);
                showFloatingText(clickX, clickY, '+50', 'hit');
                playSound('hit');
            } else if (ratio <= 0.14) {
                // 40 pts
                addScore(40);
                showFloatingText(clickX, clickY, '+40', 'hit');
                playSound('hit');
            } else if (ratio <= 0.26) {
                // 30 pts
                addScore(30);
                showFloatingText(clickX, clickY, '+30', 'hit');
                playSound('hit');
            } else if (ratio <= 0.42) {
                // 20 pts
                addScore(20);
                showFloatingText(clickX, clickY, '+20', 'hit');
                playSound('hit');
            } else if (ratio <= 0.60) {
                // 15 pts
                addScore(15);
                showFloatingText(clickX, clickY, '+15', 'hit');
                playSound('hit');
            } else if (ratio <= 0.78) {
                // 10 pts
                addScore(10);
                showFloatingText(clickX, clickY, '+10', 'hit');
                playSound('hit');
            } else {
                // 5 pts
                addScore(5);
                showFloatingText(clickX, clickY, '+5', 'hit');
                playSound('hit');
            }

            // Respawn target on hit
            if (gameState.gameActive) {
                spawnTarget();
            }

            // Check for game over
            if (gameState.misses >= MAX_MISSES) {
                endGame('lose');
            }

            updateHUD();
        }

        function addScore(points) {
            gameState.score += points;
        }

        function showFloatingText(x, y, text, type) {
            const rect = canvas.getBoundingClientRect();
            const element = document.createElement('div');
            element.className = `floating-text ${type}`;
            element.textContent = text;
            element.style.left = `${rect.left + x}px`;
            element.style.top = `${rect.top + y}px`;
            document.body.appendChild(element);

            // Remove after animation completes
            setTimeout(() => {
                element.remove();
            }, 1000);
        }

        function updateHUD() {
            // Player name
            document.getElementById('hud-player').textContent = gameState.player.name;

            // Timer (MM:SS)
            const minutes = Math.floor(gameState.timeLeft / 60);
            const seconds = gameState.timeLeft % 60;
            const timerEl = document.getElementById('hud-time');
            timerEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            if (gameState.timeLeft <= 30) {
                timerEl.classList.add('danger');
            } else {
                timerEl.classList.remove('danger');
            }

            // Score
            document.getElementById('hud-score').textContent = gameState.score;

            // Misses
            document.getElementById('hud-misses').textContent = `${gameState.misses}/${MAX_MISSES}`;
        }

        function endGame(reason) {
            gameState.gameActive = false;

            // Stop timers
            clearInterval(timerInterval);
            cancelAnimationFrame(animationFrameId);

            // Save score
            saveScore().then(() => {
                showLeaderboard(reason);
            });
        }

        async function saveScore() {
            try {
                await fetch(API.scores, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        player_id: gameState.player.id,
                        score: gameState.score,
                        misses: gameState.misses,
                        duration: gameState.elapsed
                    })
                });
            } catch (error) {
                console.error('Error saving score:', error);
            }
        }

        async function showLeaderboard(reason) {
            // Show banner based on reason
            const banner = document.getElementById('result-banner');
            if (reason === 'win') {
                banner.textContent = 'TIME UP!';
                banner.className = 'result-banner win';
            } else {
                banner.textContent = 'GAME OVER';
                banner.className = 'result-banner lose';
            }

            // Show round stats
            document.getElementById('lb-player').textContent = gameState.player.name;
            document.getElementById('lb-score').textContent = gameState.score;
            document.getElementById('lb-misses').textContent = gameState.misses;

            // Fetch leaderboard
            try {
                const response = await fetch(API.leaderboard);
                const leaderboard = await response.json();

                const tbody = document.getElementById('leaderboard-body');
                tbody.innerHTML = '';

                leaderboard.forEach((player, index) => {
                    const row = document.createElement('tr');
                    if (player.name === gameState.player.name) {
                        row.classList.add('current-player-highlight');
                    }

                    const medals = ['🥇', '🥈', '🥉'];
                    const medal = index < 3 ? `<span class="medal">${medals[index]}</span>` : '';
                    row.innerHTML = `
                        <td>${index + 1}${medal}</td>
                        <td>${player.name}</td>
                        <td>${player.best_score}</td>
                        <td>${player.games_played}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error('Error fetching leaderboard:', error);
            }

            switchScreen('leaderboard');
        }

        }
    </script>
